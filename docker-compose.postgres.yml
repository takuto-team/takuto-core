# PostgreSQL-backed Takuto deployment.
#
# Usage:
#   make start BACKEND=postgres     — start Takuto + Postgres
#   make stop  BACKEND=postgres
#
# Or directly:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# This overlay layers on top of the base docker-compose.yml (SQLite default).
# It adds a `postgres` service and injects TAKUTO_DATABASE_CONNECTION into
# the takuto container, which overrides `[database].connection` in
# config.toml at startup. No other changes are needed in your config — the
# base SQLite deployment remains untouched.
#
# Plan-11 §8 importer: when a legacy `takuto.db` exists in the takuto-data
# volume AND the Postgres target has no `system_metadata.import_complete`
# row, Takuto copies every user-data table into Postgres on first boot.
# Subsequent restarts skip the import.

services:
  takuto:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Plan-11: TAKUTO_DATABASE_CONNECTION overrides [database].connection.
      # The hostname `postgres` resolves via Docker DNS to the service below.
      - TAKUTO_DATABASE_CONNECTION=postgres://${POSTGRES_USER:-takuto}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-takuto}

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-takuto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-takuto}
    volumes:
      - takuto-pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # `pg_isready` checks the server is accepting connections. The
      # takuto startup probe (`SELECT 1` with a 5 s timeout) is gated
      # by `[database].fail_fast` — without `condition: service_healthy`
      # on the depends_on above, takuto can race ahead of pg's first
      # accept() and abort with "Database backend unreachable".
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-takuto}", "-d", "${POSTGRES_DB:-takuto}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  takuto-pg:
