# Example: PR review loop after main flow is Done (`[[review_agent_steps]]`).
# Copy to `review.toml` (gitignored) and set:
#   [general]
#   review_workflow_steps_file = "workflows/review.toml"
#
# Placeholders: pr_url, description (alias for ticket_description), plus the same ticket fields as ticket steps.
# Optional `when`: "always" (default), "ticketing", "no_ticketing".

[[review_agent_steps]]
name = "Address PR feedback"
prompt = "Pull request URL: {pr_url}\n\nTicket context:\n{ticket_context}\n\nUse GitHub tooling (e.g. `gh pr view`, `gh api` for review comments) to find unresolved PR feedback. Address each item with code changes, commit, and push updates to the PR branch."
repeat = 1
