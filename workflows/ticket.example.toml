# Example: main Jira ticket pipeline (`[[agent_steps]]`).
# Copy to `ticket.toml` (gitignored) and set in config.toml:
#   [general]
#   ticket_workflow_steps_file = "workflows/ticket.toml"
#
# Placeholders: ticket_key, ticket_summary, ticket_description, description,
# ticket_type, acceptance_criteria, ticket_context
#
# `when` controls step eligibility: "always" (default), "ticketing" (only when
# Jira/acli is authenticated), "no_ticketing" (only when Jira is unavailable).
# Steps whose `when` does not match the current mode are skipped entirely and
# do not count toward the progress bar.

# --- Runs in any mode (default) -----------------------------------------------

[[agent_steps]]
name = "Implement ticket"
prompt = "Implement this Jira ticket following the project's conventions.\n\nTicket context:\n{ticket_context}\n\nAdd or update tests as appropriate."
repeat = 1
# when = "always"  # default — can be omitted

[[agent_steps]]
name = "Review changes"
prompt = "Review all uncommitted changes for correctness, security, and code style. Fix any issues."
repeat = 1

