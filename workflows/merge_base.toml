# Merge base branch — loaded via [general] merge_base_workflow_steps_file in config.toml

[[agent_steps]]
name = "Enable Caveman"
prompt = """
/caveman ultra
"""
repeat = 1

[[merge_base_agent_steps]]
name = "Merge base branch"
prompt = """
/merge-base-branch

If there were conflicts on any e2e snapshot files, run `npm run test:visual:update:docker`

Make sure all changes are staged then push with --no-verify option
"""
repeat = 1
