# Example: merge base branch workflow.
#
# Copy to `merge_base.toml` alongside your other workflow files.
# No config.toml key needed — workflows are discovered automatically from the workflows/ directory.
#
# Format: top-level `name`, optional `depends_on`, and `[[steps]]` entries.
# See implement_ticket.example.toml for full field reference.
#
# Available prompt placeholders:
#   {base_branch}     – the target branch to merge from (e.g. main, develop)
#   {pr_url}          – URL of the open pull request
#   {ticket_context}  – formatted summary: key, title, description, acceptance criteria

name = "Merge Base Branch"
depends_on = ["implement_ticket"]

# ── Step 1: Merge base branch ────────────────────────────────────────────────
[[steps]]
name = "Merge base branch"
prompt = """
Fetch the latest `{base_branch}` from remote and merge it into the current branch.

Resolve any conflicts — prefer the current branch's changes for new feature code, but keep
the base branch's changes for configuration and dependency files unless they directly conflict
with this ticket's work.

Run lint and tests after the merge to verify no regressions were introduced.
Commit the merge and push.
"""
repeat = 1
