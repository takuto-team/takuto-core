# Example: merge base branch workflow (`[[merge_base_agent_steps]]`).
# Copy to `merge_base.toml` (now tracked in git) and set:
#   [general]
#   merge_base_workflow_steps_file = "workflows/merge_base.toml"
#
# Placeholders: {base_branch}, {pr_url}, {ticket_context}

[[merge_base_agent_steps]]
name = "Merge base branch"
prompt = """
Fetch the latest `{base_branch}` from remote and merge it into the current branch.

Resolve any conflicts — prefer the current branch's changes for new code, but keep
the base branch's changes for configuration and dependency files unless they conflict
with this ticket's work.

If there are conflicts on visual snapshot files, update snapshots.
Run lint and tests after the merge to verify no regressions.
Commit the merge and push.
"""
skills = [{ name = "merge-base-branch" }]
repeat = 1
