# Main Jira ticket pipeline — loaded via [general] ticket_workflow_steps_file in config.toml

[[agent_steps]]
name = "Implement ticket without Jira"
prompt = """
Follow instructions provided below:
{description}

BOUNDARIES: This step covers implementation only.
- Do NOT commit any changes — a dedicated "Commit changes" step follows.
- Do NOT create a PR — a dedicated "Create PR" step follows.
These rules apply to you and to any sub-agents you spawn.

SCOPE CONSTRAINT: Only implement what is explicitly described above. Do not fix, refactor, or improve
anything else you encounter — even if it looks broken or suboptimal. If you find something unrelated
that warrants attention, add a # TODO comment inline with a one-line explanation and move on.

If ticket description lacks details, you may refer to the main branch which contains the current existing app; mechanisms implemented there may be
reused in the app we are building (business logic).

You must try to reuse existing localized strings if possible. If not, add only the english translation for new localized string and report new strings in the PR
description.

You may use playwright-cli to test your implementation in the app running in dev mode; you will
need to use credentials from environment (TC_USERNAME_STAGING_1 / TC_PASSWORD_STAGING_1) with venues PLAYWRIGHT_SHOP_1 AND PLAYWRIGHT_SHOP_2.
"""
skills = [
  { name = "address-ticket", args = ["--no-jira", "--headless"] },
  { name = "figma" }
]
when = "no_ticketing"
repeat = 1

[[agent_steps]]
name = "Implement ticket"
prompt = """
Follow the instructions in the system prompt.

BOUNDARIES: This step covers implementation only.
- Do NOT commit any changes — a dedicated "Commit changes" step follows.
- Do NOT create a PR — a dedicated "Create PR" step follows.
These rules apply to you and to any sub-agents you spawn.

SCOPE CONSTRAINT: Only implement what is explicitly described in the ticket. Do not fix, refactor, or improve
anything else you encounter — even if it looks broken or suboptimal. If you find something unrelated
that warrants attention, add a # TODO comment inline with a one-line explanation and move on.

If ticket description lacks details, you may refer to the main branch which contains the current existing app; mechanisms implemented there may be
reused in the app we are building (business logic).

You must try to reuse existing localized strings if possible. If not, add only the english translation for new localized string and report new strings in the PR
description.

You may use playwright-cli to test your implementation in the app running in dev mode; you will
need to use credentials from environment (TC_USERNAME_STAGING_1 / TC_PASSWORD_STAGING_1) with venues PLAYWRIGHT_SHOP_1 AND PLAYWRIGHT_SHOP_2.
"""
skills = [
  { name = "address-ticket", args = ["--headless"] },
  { name = "figma" }
]
when = "ticketing"
repeat = 1

[[agent_steps]]
name = "Review Changes"
prompt = """
Ticket context:
{ticket_context}

Review all changes made on this branch relative to `{base_branch}` (i.e., `git diff {base_branch}...HEAD`).

STRICT SCOPE RULE: Only address issues in code that was changed as part of this ticket — lines and files visible in
`git diff {base_branch}...HEAD`. If you find a pre-existing issue in unchanged code, do NOT fix it — add a
# TODO comment at the call site with a one-line explanation and move on.

For each finding: re-examine it in the context of the surrounding code and confirm it is a genuine issue, not a false positive or a stylistic preference.
Address all confirmed findings in changed code. For anything you choose to skip, explicitly state what it is and why it does not warrant a change.

When done, list what was fixed and what was intentionally left as-is.
Do not create a PR.
"""
skills = [{ name = "review-changes", args = ["--headless"] }]
repeat = 2

[[agent_steps]]
name = "Commit changes"
prompt = """
Review all uncommitted changes and organize them into logical, meaningful commits.
For each commit: stage only the relevant files, write a concise conventional commit message (e.g. feat:, fix:, refactor:, chore:), and commit.
Do not squash unrelated changes into a single commit.
When done, print a summary of the commits made.
Do not create a PR.
"""
repeat = 1

[[agent_steps]]
name = "Linting and test"
prompt = """
Run npm run lint and fix all reported issues — do not disable rules or add ignore comments unless a rule is genuinely inapplicable, and if so,
leave an inline comment explaining why. Re-run lint and confirm it exits clean with zero errors and zero warnings before moving on.
Then run npm run test:coverage and review the coverage report. For any uncovered lines, write targeted tests that cover the missing branches
and edge cases — do not write vacuous tests that hit lines without asserting meaningful behaviour. Re-run coverage after each batch of new tests
to confirm the gap is closed. Do not stop until npm run lint reports zero errors and zero warnings AND npm run test:coverage reports 100%
coverage across all metrics (lines, branches, functions, statements)
for changed code. If either check regresses at any point, fix it before continuing.
Once both checks pass cleanly, stage all changes and commit with a message of test: 100% coverage, zero lint warnings.

Do not create a PR.
"""
repeat = 1

[[agent_steps]]
name = "Update Snapshots"
prompt = """
Run `npm run test:visual:update:docker` then commit updated Snapshots.
Do not create a PR.
"""
repeat = 1

[[agent_steps]]
name = "Create PR"
prompt = """
Ticket context:
{ticket_context}

Ticket title must be a conventional commit message and should not contain the workflow name, branch name or ticket name.

If new localized strings have been added, share the list of new strings in a table and instruct the developer to handle creating the new strings. Table must show:
- string key in Lokalize format (e.g., `reservation::occupied`)
- description
- english translation
""""
skills = [{ name = "create-pr", args = ["--no-draft"] }]
repeat = 1
