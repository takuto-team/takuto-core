# Docker-in-Docker sidecar — use when Maestro needs `docker` / `docker compose`
# inside the container (e.g. compose_up_commands, Playwright containers).
#
# Recommended for macOS (Podman or Docker Desktop).
# Works on all platforms — no host socket mount required.
#
# Merge with: COMPOSE_FILE=docker-compose.yml:docker-compose.dind.yml
#
# The sidecar runs a real Docker daemon. Maestro connects via DOCKER_HOST over
# the internal compose network (no TLS — traffic never leaves the bridge).
# The `workspace` volume is shared so paths like /workspace/project/... resolve
# identically for both the Maestro CLI and the DinD daemon.

services:
  dind:
    container_name: maestro-dind
    image: docker:27-dind
    privileged: true
    ports:
      # DinD worker ports: map to 9200-9300 to avoid conflict with host editor containers (9100-9200)
      - "9200-9300:9100-9200"
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - workspace:/workspace
      - maestro-data:/shared-auth/maestro-data
      - dind-storage:/var/lib/docker
      # Auth volumes — workers bind-mount from /shared-auth/* into standard home paths
      - claude-auth:/shared-auth/claude
      - cursor-auth:/shared-auth/cursor
      - agents-data:/shared-auth/agents
      - gh-auth:/shared-auth/gh
      - acli-auth:/shared-auth/acli
      - fcli-auth:/shared-auth/fcli
      - npm-cache:/shared-auth/npm
      - mise-data:/shared-auth/mise-data
      - mise-cache:/shared-auth/mise-cache
      - aws-config:/shared-auth/aws
      - playwright-cache:/shared-auth/playwright-cache
      - vscode-data:/shared-auth/vscode
      # Config — workers need config.toml for egress rules (extra_egress_hosts, allow_all_https)
      - ./config.toml:/etc/maestro/config.toml:ro
      - ./workflows:/etc/maestro/workflows:ro
      - ./maestro.env:/etc/maestro/env:ro
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  maestro:
    environment:
      - DOCKER_HOST=tcp://dind:2375
      - MAESTRO_DIND_PORT_OFFSET=100
    depends_on:
      dind:
        condition: service_healthy

volumes:
  maestro-data:
  dind-storage:
  vscode-data:
