services:
  maestro:
    build:
      context: .
      args:
        # File in build context; use your own config.toml if it lists [docker] build_commands (e.g. skill installers)
        MAESTRO_BUILD_CONFIG: config.toml.example
    ports:
      - "8080:8080"
    cap_add:
      - NET_ADMIN
    volumes:
      # Configuration file
      - ./config.toml:/etc/maestro/config.toml:ro
      # Custom environment variables (optional)
      - ./maestro.env:/etc/maestro/env:ro
      # Persistent auth + skills state for maestro user
      - claude-auth:/home/maestro/.claude
      - cursor-auth:/home/maestro/.cursor
      - gh-auth:/home/maestro/.config/gh
      - acli-auth:/home/maestro/.config/acli
      # Workspace — cloned during setup, persisted across restarts
      - workspace:/workspace
      # npm cache — persisted for the maestro user
      - npm-cache:/home/maestro/.npm
      # AWS credentials (optional, for CodeArtifact auth)
      - aws-config:/home/maestro/.aws
    environment:
      # Must match mounted config path (used by preflight / docker-hooks startup in entrypoint)
      - MAESTRO_CONFIG=/etc/maestro/config.toml
      # Figma API token (optional, also configurable in config.toml)
      - FIGMA_API_TOKEN=${FIGMA_API_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  claude-auth:
  cursor-auth:
  gh-auth:
  acli-auth:
  workspace:
  npm-cache:
  aws-config:
