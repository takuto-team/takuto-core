# MariaDB-backed Takuto deployment.
#
# Usage:
#   make start BACKEND=mariadb      — start Takuto + MariaDB
#   make stop  BACKEND=mariadb
#
# Or directly:
#   docker compose -f docker-compose.yml -f docker-compose.mariadb.yml up -d
#
# MariaDB and MySQL share the same wire protocol, sqlx driver, and SQL
# dialect from Takuto's point of view (DbBackend::MySql covers both).
# Swap `mariadb:11` for `mysql:8` if you want to target MySQL specifically.

services:
  takuto:
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      # Plan-11: TAKUTO_DATABASE_CONNECTION overrides [database].connection.
      # `mysql://` scheme covers both MySQL and MariaDB (same protocol).
      - TAKUTO_DATABASE_CONNECTION=mysql://${MARIADB_USER:-takuto}:${MARIADB_PASSWORD:-changeme}@mariadb:3306/${MARIADB_DATABASE:-takuto}

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_USER: ${MARIADB_USER:-takuto}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-changeme}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-takuto}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
    volumes:
      - takuto-mariadb:/var/lib/mysql
    # Port not published by default — only takuto reaches it on the
    # internal compose network. Uncomment for mysql-cli from the host.
    # ports:
    #   - "3306:3306"
    healthcheck:
      # `healthcheck.sh --connect` (shipped in the official image) confirms
      # mariadbd is accepting connections and the named DB exists. Takuto's
      # 5 s `SELECT 1` probe runs immediately after takuto boots — without
      # the depends_on gate, fail_fast=true would race.
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  takuto-mariadb:
