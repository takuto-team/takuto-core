name: Close external pull requests

# Maestro is dual-licensed (FSL + commercial) and does not yet have CLA
# infrastructure to accept outside contributions. This workflow politely
# closes any pull request whose author is not the repository owner, a member,
# or a collaborator, and links them to the channels that *are* open.
#
# Uses pull_request_target so the workflow runs in the base-repo context with
# the permissions needed to comment and close. The job does NOT check out the
# PR's code (no `actions/checkout`) — this avoids the well-known risk of
# pull_request_target executing untrusted code.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'COLLABORATOR'
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = [
              `Thanks for your interest in Maestro, @${pr.user.login} — and sorry to close this without review.`,
              ``,
              `**Maestro is not currently accepting external code contributions.**`,
              ``,
              `The project is dual-licensed (FSL + commercial). Accepting outside`,
              `code under that model requires a Contributor License Agreement (CLA) and`,
              `tooling to track sign-offs. That infrastructure is not yet in place, so`,
              `we cannot legally merge contributions today. This will change once a CLA`,
              `process is set up.`,
              ``,
              `What you can do right now:`,
              ``,
              `- Open a [GitHub Issue](https://github.com/${context.repo.owner}/${context.repo.repo}/issues) to report a bug or request a feature.`,
              `- Start a [Discussion](https://github.com/${context.repo.owner}/${context.repo.repo}/discussions) to share an idea or ask a question.`,
              `- Report a security vulnerability **privately** per [\`SECURITY.md\`](../blob/main/SECURITY.md) — never in a public issue.`,
              ``,
              `See [\`CONTRIBUTING.md\`](../blob/main/CONTRIBUTING.md) for the full policy.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: 'closed',
            });
