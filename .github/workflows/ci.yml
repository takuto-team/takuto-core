name: CI

# Enforces the §2 quality bar from CODING_STANDARDS.md and the standing CI
# decisions in lore/code-quality-principles.md §5:
#
#   - cargo build --workspace --all-targets        (zero warnings)
#   - cargo clippy --workspace --all-targets -- -D warnings
#   - cargo test  --workspace
#   - npm ci && npm run build  (frontend, with strict TypeScript)
#
# A warning on `main` is a release-blocker, not a future task. If a transient
# toolchain issue surfaces a warning we cannot fix today, pin the toolchain in
# rust-toolchain.toml — do not relax the gate.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so we don't pay for stale CI when
# someone pushes a fix-up commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (build · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo build --workspace --all-targets
        run: cargo build --workspace --all-targets --locked

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace --locked

      - name: cargo doc --workspace --no-deps
        run: cargo doc --workspace --no-deps --locked

  db-postgres:
    # Plan-11 §10 step 4: prove the dialect-aware migration source and the
    # DbAdapter-backed DAOs work end-to-end against a real PostgreSQL.
    # Runs the `#[ignore]`-gated tests under `crates/maestro-core/src/db/`
    # with `DATABASE_URL` pointed at a service-container PG instance.
    name: DB backend (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: maestro
          POSTGRES_PASSWORD: maestro
          POSTGRES_DB: maestro_ci
        ports:
          - 5432:5432
        # GHA waits on the service's health check before running steps,
        # so we don't need a manual `pg_isready` loop in the step body.
        options: >-
          --health-cmd "pg_isready -U maestro -d maestro_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://maestro:maestro@localhost:5432/maestro_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test --ignored (db migrations + CRUD against Postgres)
        # Substring filter `postgres` matches the two Postgres-specific
        # ignored tests; the MySQL ignored test stays skipped (it expects
        # a `mysql://` URL we don't provide here). `--test-threads=1`
        # serialises the migrator + CRUD tests against the shared DB.
        run: cargo test -p maestro-core --lib db::migrate -- --ignored --test-threads=1 postgres

  db-mysql:
    # Plan-11 step 4 (MySQL leg): same idea as `db-postgres`, but spins
    # up a MySQL service container. Validates the dialect-aware
    # transforms (`INTEGER PRIMARY KEY AUTOINCREMENT` → `BIGINT
    # AUTO_INCREMENT PRIMARY KEY`, `DEFAULT '<lit>'` → `DEFAULT
    # ('<lit>')`) and the per-backend upsert tail (`ON DUPLICATE KEY
    # UPDATE` instead of `ON CONFLICT(...) DO UPDATE`).
    name: DB backend (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: maestro
          MYSQL_PASSWORD: maestro
          MYSQL_DATABASE: maestro_ci
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -umaestro -pmaestro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: mysql://maestro:maestro@localhost:3306/maestro_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test --ignored (db migrations + CRUD against MySQL)
        run: cargo test -p maestro-core --lib db::migrate -- --ignored --test-threads=1 mysql

  ui:
    name: UI (npm build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm test
        run: npm test

      - name: tsc --noEmit (strict type check)
        run: npx tsc --noEmit

      - name: npm run build
        run: npm run build

  audit-ui:
    name: UI (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      # Fail only on high/critical advisories in production dependencies.
      # Dev-only tooling (storybook, vitest, …) is excluded with --omit=dev,
      # and low/moderate findings are triaged separately rather than blocking PRs.
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so push events scan every commit; PR events scan the
          # commits in the pull request.
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by the action's API call. No GITLEAKS_LICENSE is needed
          # for personal accounts / this repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  license-headers:
    name: License headers (FSL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check FSL headers on source files
        run: ./scripts/check-license-headers.sh

  cargo-deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo-deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  cargo-audit:
    name: RustSec audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Keep in sync with the `ignore` list in deny.toml:
          #   RUSTSEC-2023-0071 — rsa Marvin attack, no upstream fix yet.
          #   RUSTSEC-2026-0009 — time DoS; fixed in >=0.3.47, blocked by an
          #                       exact `=0.3.45` pin in maestro-web.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0009

  config-doc:
    name: Config documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Every config.toml.example key is documented
        run: ./scripts/check-config-doc.sh

  container-build:
    name: Container smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Smoke-build the production image (the Dockerfile's final stage). Proves
      # the image assembles; not pushed or loaded. GHA layer cache keeps PRs fast.
      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: maestro:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
