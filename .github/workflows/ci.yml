name: CI

# Enforces the §2 quality bar from CODING_STANDARDS.md and the standing CI
# decisions in lore/code-quality-principles.md §5:
#
#   - cargo build --workspace --all-targets        (zero warnings)
#   - cargo clippy --workspace --all-targets -- -D warnings
#   - cargo test  --workspace
#   - npm ci && npm run build  (frontend, with strict TypeScript)
#
# A warning on `main` is a release-blocker, not a future task. If a transient
# toolchain issue surfaces a warning we cannot fix today, pin the toolchain in
# rust-toolchain.toml — do not relax the gate.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so we don't pay for stale CI when
# someone pushes a fix-up commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (build · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      # Swatinem/rust-cache uses (rustc version + Cargo.lock + job name) as
      # the cache key, prunes stale intermediate artifacts so the cache
      # doesn't bloat over time, and restore-falls-back across lockfile
      # bumps. The previous actions/cache config invalidated on every
      # Cargo.lock change, which forced a cold build on most PRs.
      - name: Rust build cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install cargo-nextest
        uses: taiki-e/install-action@6887963ccf37a9ddcd8c5fa4baeb3e1e5fd61fa1 # v2
        with:
          tool: cargo-nextest

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      # `takuto-web` embeds `ui/dist/` via `rust-embed`, which fails to
      # compile if the directory is missing. The UI job builds the real
      # frontend; the rust job only needs the directory to exist so the
      # macro can produce an (empty) asset set for tests/clippy/doc.
      - name: Create empty ui/dist for rust-embed
        run: mkdir -p ui/dist && touch ui/dist/.gitkeep

      # clippy with `--all-targets` compiles every test/example/bench,
      # which warms the same artifacts cargo-nextest needs below. A
      # separate `cargo build` step was just paying the link cost twice.
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      # cargo-nextest parallelises test execution per-process (libtest
      # serialises per-thread), retries flakies, and skips doc-tests
      # (this workspace has none, only `text`/`ignore` code fences).
      - name: cargo nextest run --workspace
        run: cargo nextest run --workspace --locked --no-fail-fast

      - name: cargo doc --workspace --no-deps
        run: cargo doc --workspace --no-deps --locked

  db-postgres:
    # Plan-11 §10 step 4: prove the dialect-aware migration source and the
    # DbAdapter-backed DAOs work end-to-end against a real PostgreSQL.
    # Runs the `#[ignore]`-gated tests under `crates/takuto-core/src/db/`
    # with `DATABASE_URL` pointed at a service-container PG instance.
    name: DB backend (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: takuto
          POSTGRES_PASSWORD: takuto
          POSTGRES_DB: takuto_ci
        ports:
          - 5432:5432
        # GHA waits on the service's health check before running steps,
        # so we don't need a manual `pg_isready` loop in the step body.
        options: >-
          --health-cmd "pg_isready -U takuto -d takuto_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://takuto:takuto@localhost:5432/takuto_ci
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Create empty ui/dist for rust-embed
        run: mkdir -p ui/dist && touch ui/dist/.gitkeep

      - name: cargo test --ignored (db migrations + CRUD against Postgres)
        # `--skip mysql` drops the MySQL-only ignored tests (they hard-
        # connect via `MySqlPool::connect` and would time out against
        # our Postgres service container). `--test-threads=1`
        # serialises the migrator + CRUD tests against the shared DB.
        run: cargo test -p takuto-core --lib db::migrate -- --ignored --test-threads=1 --skip mysql

  db-mysql:
    # Plan-11 step 4 (MySQL leg): same idea as `db-postgres`, but spins
    # up a MySQL service container. Validates the dialect-aware
    # transforms (`INTEGER PRIMARY KEY AUTOINCREMENT` → `BIGINT
    # AUTO_INCREMENT PRIMARY KEY`, `DEFAULT '<lit>'` → `DEFAULT
    # ('<lit>')`) and the per-backend upsert tail (`ON DUPLICATE KEY
    # UPDATE` instead of `ON CONFLICT(...) DO UPDATE`).
    name: DB backend (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: takuto
          MYSQL_PASSWORD: takuto
          MYSQL_DATABASE: takuto_ci
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -utakuto -ptakuto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: mysql://takuto:takuto@localhost:3306/takuto_ci
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Create empty ui/dist for rust-embed
        run: mkdir -p ui/dist && touch ui/dist/.gitkeep

      - name: cargo test --ignored (db migrations + CRUD against MySQL)
        # `--skip postgres` drops the Postgres-only ignored tests
        # (they hard-connect via `PgPool::connect`).
        run: cargo test -p takuto-core --lib db::migrate -- --ignored --test-threads=1 --skip postgres

  ts-types-drift:
    # The dashboard wire DTOs (WorkflowSummary, …) are mirrored to
    # `ui/src/api/generated/*.ts` by ts-rs. Regenerate and fail if the
    # committed TypeScript drifts from the Rust source of truth.
    name: TS types (generated drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Create empty ui/dist for rust-embed
        run: mkdir -p ui/dist && touch ui/dist/.gitkeep

      - name: Regenerate TypeScript bindings
        run: ./scripts/generate-ts-types.sh

      - name: Fail on drift between Rust DTOs and committed TypeScript
        run: |
          if ! git diff --exit-code -- ui/src/api/generated; then
            echo "::error::ui/src/api/generated is out of date with the Rust DTOs."
            echo "Run ./scripts/generate-ts-types.sh and commit the result."
            exit 1
          fi

  ui:
    name: UI (npm build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run lint
        run: npm run lint

      - name: npm test
        run: npm test

      - name: tsc --noEmit (strict type check)
        run: npx tsc --noEmit

      - name: npm run build
        run: npm run build

  audit-ui:
    name: UI (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      # Fail only on high/critical advisories in production dependencies.
      # Dev-only tooling (storybook, vitest, …) is excluded with --omit=dev,
      # and low/moderate findings are triaged separately rather than blocking PRs.
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so push events scan every commit; PR events scan the
          # commits in the pull request.
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # Required by the action's API call. No GITLEAKS_LICENSE is needed
          # for personal accounts / this repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  license-headers:
    name: License headers (FSL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check FSL headers on source files
        run: ./scripts/check-license-headers.sh

  cargo-deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # The official EmbarkStudios/cargo-deny-action ships a Docker
      # image with cargo baked in (1.83 as of v2.0.4) and ignores its
      # own `rust-version` input. Our workspace declares
      # `edition = "2024"`, which needs cargo 1.85+, so we install
      # the toolchain ourselves and invoke cargo-deny directly.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo-deny binary
        id: cache-cargo-deny
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-0.19.8

      # 0.19+ pulls in a rustsec crate that understands CVSS 4.0
      # (used by RUSTSEC-2026-0035 and later advisories). 0.16.x
      # failed to parse the advisory db on every run.
      - name: Install cargo-deny
        if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.19.8

      - name: cargo-deny check
        run: cargo deny check advisories bans licenses sources

  cargo-audit:
    name: RustSec audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: cargo-audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Keep in sync with the `ignore` list in deny.toml:
          #   RUSTSEC-2023-0071 — rsa Marvin attack, no upstream fix yet.
          #   RUSTSEC-2026-0009 — time DoS; fixed in >=0.3.47, blocked by an
          #                       exact `=0.3.45` pin in takuto-web.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0009

  config-doc:
    name: Config documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Every config.toml.example key is documented
        run: ./scripts/check-config-doc.sh

  container-build:
    name: Container smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      # Smoke-build the production image (the Dockerfile's final stage). Proves
      # the image assembles; not pushed or loaded. GHA layer cache keeps PRs fast.
      - name: Build runtime image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          push: false
          tags: takuto:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
