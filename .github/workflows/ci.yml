name: CI

# Enforces the §2 quality bar from CODING_STANDARDS.md and the standing CI
# decisions in lore/code-quality-principles.md §5.
#
# The heavy cargo gates (fmt / clippy -D warnings / test / doc) run LOCALLY,
# NOT in CI — a cold workspace build was ~20 min per run. Run them before
# pushing with `make checked-push` (preflight, then push only if green) or
# `make check` on demand. A pre-push *hook* was tried but a multi-minute hook
# idles git's push connection into a timeout (SIGPIPE), so the gate is a
# wrapper that pushes on a fresh connection instead. CI still covers everything
# that needs a clean/remote environment: DB backends, the frontend build,
# generated-type drift, supply-chain audits, and the container smoke build.
#
# A warning is still a release-blocker, not a future task. If a transient
# toolchain issue surfaces a warning we cannot fix today, pin the toolchain in
# rust-toolchain.toml — do not relax the gate.

# Checks gate merges (pull_request) and releases (a v* tag runs the checks,
# then the build/publish jobs in the SAME run). Deliberately NOT run on direct
# `push: main` so the checks run exactly once per release — on the tag —
# instead of once for the code push and again for the tag.
on:
  pull_request:
  push:
    tags: ['v*']

# Cancel superseded runs on the same ref so we don't pay for stale CI when
# someone pushes a fix-up commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: takuto-team/takuto-core

jobs:
  db-postgres:
    # Plan-11 §10 step 4: prove the dialect-aware migration source and the
    # DbAdapter-backed DAOs work end-to-end against a real PostgreSQL.
    # Runs the `#[ignore]`-gated tests under `crates/takuto-core/src/db/`
    # with `DATABASE_URL` pointed at a service-container PG instance.
    name: DB backend (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: takuto
          POSTGRES_PASSWORD: takuto
          POSTGRES_DB: takuto_ci
        ports:
          - 5432:5432
        # GHA waits on the service's health check before running steps,
        # so we don't need a manual `pg_isready` loop in the step body.
        options: >-
          --health-cmd "pg_isready -U takuto -d takuto_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://takuto:takuto@localhost:5432/takuto_ci
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Create empty ui/dist for rust-embed
        run: mkdir -p ui/dist && touch ui/dist/.gitkeep

      - name: cargo test --ignored (db migrations + CRUD against Postgres)
        # `--skip mysql` drops the MySQL-only ignored tests (they hard-
        # connect via `MySqlPool::connect` and would time out against
        # our Postgres service container). `--test-threads=1`
        # serialises the migrator + CRUD tests against the shared DB.
        run: cargo test -p takuto-core --lib db::migrate -- --ignored --test-threads=1 --skip mysql

  db-mysql:
    # Plan-11 step 4 (MySQL leg): same idea as `db-postgres`, but spins
    # up a MySQL service container. Validates the dialect-aware
    # transforms (`INTEGER PRIMARY KEY AUTOINCREMENT` → `BIGINT
    # AUTO_INCREMENT PRIMARY KEY`, `DEFAULT '<lit>'` → `DEFAULT
    # ('<lit>')`) and the per-backend upsert tail (`ON DUPLICATE KEY
    # UPDATE` instead of `ON CONFLICT(...) DO UPDATE`).
    name: DB backend (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: takuto
          MYSQL_PASSWORD: takuto
          MYSQL_DATABASE: takuto_ci
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -utakuto -ptakuto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: mysql://takuto:takuto@localhost:3306/takuto_ci
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Create empty ui/dist for rust-embed
        run: mkdir -p ui/dist && touch ui/dist/.gitkeep

      - name: cargo test --ignored (db migrations + CRUD against MySQL)
        # `--skip postgres` drops the Postgres-only ignored tests
        # (they hard-connect via `PgPool::connect`).
        run: cargo test -p takuto-core --lib db::migrate -- --ignored --test-threads=1 --skip postgres

  ts-types-drift:
    # The dashboard wire DTOs (WorkflowSummary, …) are mirrored to
    # `ui/src/api/generated/*.ts` by ts-rs. Regenerate and fail if the
    # committed TypeScript drifts from the Rust source of truth.
    name: TS types (generated drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Create empty ui/dist for rust-embed
        run: mkdir -p ui/dist && touch ui/dist/.gitkeep

      - name: Regenerate TypeScript bindings
        run: ./scripts/generate-ts-types.sh

      - name: Fail on drift between Rust DTOs and committed TypeScript
        run: |
          if ! git diff --exit-code -- ui/src/api/generated; then
            echo "::error::ui/src/api/generated is out of date with the Rust DTOs."
            echo "Run ./scripts/generate-ts-types.sh and commit the result."
            exit 1
          fi

  ui:
    name: UI (npm build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run lint
        run: npm run lint

      - name: npm test
        run: npm test

      - name: tsc --noEmit (strict type check)
        run: npx tsc --noEmit

      - name: npm run build
        run: npm run build

  audit-ui:
    name: UI (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      # Fail only on high/critical advisories in production dependencies.
      # Dev-only tooling (storybook, vitest, …) is excluded with --omit=dev,
      # and low/moderate findings are triaged separately rather than blocking PRs.
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

  license-headers:
    name: License headers (FSL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check FSL headers on source files
        run: ./scripts/check-license-headers.sh

  cargo-deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # The official EmbarkStudios/cargo-deny-action ships a Docker
      # image with cargo baked in (1.83 as of v2.0.4) and ignores its
      # own `rust-version` input. Our workspace declares
      # `edition = "2024"`, which needs cargo 1.85+, so we install
      # the toolchain ourselves and invoke cargo-deny directly.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo-deny binary
        id: cache-cargo-deny
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-0.19.8

      # 0.19+ pulls in a rustsec crate that understands CVSS 4.0
      # (used by RUSTSEC-2026-0035 and later advisories). 0.16.x
      # failed to parse the advisory db on every run.
      - name: Install cargo-deny
        if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.19.8

      - name: cargo-deny check
        run: cargo deny check advisories bans licenses sources

  cargo-audit:
    name: RustSec audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: cargo-audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Keep in sync with the `ignore` list in deny.toml:
          #   RUSTSEC-2023-0071 — rsa Marvin attack, no upstream fix yet.
          #   RUSTSEC-2026-0009 — time DoS; fixed in >=0.3.47, blocked by an
          #                       exact `=0.3.45` pin in takuto-web.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0009

  config-doc:
    name: Config documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Every config.toml.example key is documented
        run: ./scripts/check-config-doc.sh

  container-build:
    name: Container smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      # Smoke-build the production image (the Dockerfile's final stage). Proves
      # the image assembles; not pushed or loaded. GHA layer cache keeps PRs fast.
      - name: Build runtime image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          push: false
          tags: takuto:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release ────────────────────────────────────────────────────────────────
  # Build + publish the multi-arch image. Gated: only on a `v*` tag, and only
  # after EVERY check job above succeeds. On PRs the `if` is false so these are
  # skipped — the checks still gate merges without building anything.
  build:
    name: Build image (${{ matrix.arch }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - db-postgres
      - db-mysql
      - ts-types-drift
      - ui
      - audit-ui
      - license-headers
      - cargo-deny
      - cargo-audit
      - config-doc
      - container-build
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # The runtime image is large (Playwright Chromium, four AI CLIs,
      # openvscode-server, build toolchain) and Trivy exports the whole image to
      # scan it — which exhausted the ubuntu-latest runner's disk ("no space
      # left on device"). Reclaim the preinstalled SDKs/toolchains we don't use
      # (~25-30 GB on ubuntu-latest; a no-op where the paths are absent).
      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune -af || true
          df -h /

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # The image is this repo's own GHCR package, so the built-in
          # GITHUB_TOKEN can publish it (the job declares packages: write).
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build into the local daemon first so it can be scanned and an SBOM
      # generated BEFORE anything is published. The matrix runner is native for
      # its platform, so `load: true` works without emulation; the subsequent
      # push-by-digest build is a cache hit on this layer set.
      - name: Build image for scanning (load locally)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: takuto:scan-${{ matrix.arch }}
          build-args: |
            TAKUTO_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/takuto-team/takuto-core
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      # Fail the release on any fixable HIGH/CRITICAL OS vulnerability, before
      # the push step — a vulnerable image never reaches a published tag. Gated
      # on OS packages only: our own supply chain is covered by cargo-deny +
      # cargo-audit + npm audit above; the remaining library findings are
      # third-party bundled tool internals (openvscode-server, npm's vendored
      # deps) we cannot patch, so scanning them yields only unactionable noise.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: takuto:scan-${{ matrix.arch }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: table
          vuln-type: 'os'

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: takuto:scan-${{ matrix.arch }}
          format: spdx-json
          output-file: takuto-${{ matrix.arch }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom-${{ matrix.arch }}
          path: takuto-${{ matrix.arch }}.spdx.json
          if-no-files-found: error

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            TAKUTO_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/takuto-team/takuto-core
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish manifest
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
