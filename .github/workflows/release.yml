name: Build and Push Docker Image

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: takuto-team/takuto-core

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # The image (`takuto-team/takuto-core`) is this repo's own GHCR
          # package, so the workflow's built-in GITHUB_TOKEN can publish it
          # (the job already declares `permissions: packages: write`). No
          # external PAT secret needed now that we no longer push to a
          # different repo's namespace.
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image into the local Docker daemon first so it can be scanned
      # and an SBOM generated BEFORE anything is published. The matrix runner is
      # native for its platform, so `load: true` works without emulation. The
      # subsequent push-by-digest build is a cache hit on this layer set.
      - name: Build image for scanning (load locally)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: takuto:scan-${{ matrix.arch }}
          build-args: |
            TAKUTO_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/takuto-team/takuto-core
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      # Fail the release on any fixable HIGH/CRITICAL OS or library vulnerability.
      # Because this runs before the push step (and `merge` needs this job), a
      # vulnerable image never reaches a published tag.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: takuto:scan-${{ matrix.arch }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: table
          # Gate the IMAGE scan on OS packages only. Our own supply chain is
          # gated where we can actually fix it: Rust deps via cargo-deny +
          # cargo-audit and our UI via npm audit (all in ci.yml). The only
          # library/node findings left in the image are third-party bundled tool
          # internals we cannot patch — openvscode-server's editor JS
          # (extensions + node_modules) and npm's own vendored deps
          # (tar/glob/minimatch). Scanning those here only yields unactionable
          # CRITICAL/HIGH failures, so the OS-package gate is the meaningful one.
          vuln-type: 'os'

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: takuto:scan-${{ matrix.arch }}
          format: spdx-json
          output-file: takuto-${{ matrix.arch }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom-${{ matrix.arch }}
          path: takuto-${{ matrix.arch }}.spdx.json
          if-no-files-found: error

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            TAKUTO_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/takuto-team/takuto-core
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # The image (`takuto-team/takuto-core`) is this repo's own GHCR
          # package, so the workflow's built-in GITHUB_TOKEN can publish it
          # (the job already declares `permissions: packages: write`). No
          # external PAT secret needed now that we no longer push to a
          # different repo's namespace.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
