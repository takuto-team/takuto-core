name: Build and Push Docker Image

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: morphet81/maestro

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DISTRIBUTION_GHCR_TOKEN }}

      # Build the image into the local Docker daemon first so it can be scanned
      # and an SBOM generated BEFORE anything is published. The matrix runner is
      # native for its platform, so `load: true` works without emulation. The
      # subsequent push-by-digest build is a cache hit on this layer set.
      - name: Build image for scanning (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: maestro:scan-${{ matrix.arch }}
          build-args: |
            MAESTRO_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/morphet81/maestro-core
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      # Fail the release on any fixable HIGH/CRITICAL OS or library vulnerability.
      # Because this runs before the push step (and `merge` needs this job), a
      # vulnerable image never reaches a published tag.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: maestro:scan-${{ matrix.arch }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: table

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: maestro:scan-${{ matrix.arch }}
          format: spdx-json
          output-file: maestro-${{ matrix.arch }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.arch }}
          path: maestro-${{ matrix.arch }}.spdx.json
          if-no-files-found: error

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            MAESTRO_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/morphet81/maestro-core
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DISTRIBUTION_GHCR_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
