title = "Takuto gitleaks config"

# Build on top of the upstream default ruleset so new secret patterns are
# picked up automatically as gitleaks updates.
[extend]
useDefault = true

[allowlist]
description = "Known test/RFC values and synthetic fixtures — not real secrets"
# Don't scan gitleaks' own config/ignore files: their comments quote planning-
# doc filenames and fingerprints that trip the generic-api-key rule.
paths = [
  '''\.gitleaks\.toml$''',
  '''\.gitleaksignore$''',
]
regexes = [
  '''dGhlIHNhbXBsZSBub25jZQ==''',           # RFC 6455 §1.3 sample WebSocket nonce
  # Synthetic placeholder tokens used throughout unit tests. These are obvious
  # non-secrets (repeating / structured hex), never real credentials.
  '''(?:0123456789abcdef)+''',
  '''(?:abcdef0123456789)+''',
  '''(?:deadbeef)+''',
  '''aaaa1111bbbb2222cccc3333dddd4444''',
  '''eeee5555ffff6666aaaa7777bbbb8888''',
  '''(?:a{16,}|f{16,})''',
]
